<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
          <input class="text" type="text"  id="display">
           <div class="buttons1">
            <div class="buttons">
         <button class="clearbtn">C</button>
            <button>(</button>
            <button>)</button>
            <button class="operator">/</button>

            <button>7</button>
            <button>8</button>
            <button>9</button>
            <button class="operator">*</button>

            <button>4</button>
            <button>5</button>
            <button>6</button>
            <button class="operator">-</button>

            <button>1</button>
            <button>2</button>
            <button>3</button>
            <button class="operator">+</button>

            <button>0</button>
            <button>.</button>
            <button class="equal">=</button>
         
            <button class="backspace">Back</button>
        </div>
        </div>
    </div>

    <script src="j.js"></script>

    </div>
    
</body>
</html>
